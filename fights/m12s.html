<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DYM</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --crust: #11111b; --mantle: #181825; --base: #1e1e2e;
        --surface0: #313244; --surface1: #45475a; --surface2: #585b70;
        --overlay0: #6c7086; --overlay1: #7f849c;
        --subtext0: #a6adc8; --subtext1: #bac2de; --text: #cdd6f4;
        --mauve: #cba6f7; --red: #f38ba8; --maroon: #eba0ac; --peach: #ff751f;
        --yellow: #f9e2af; --green: #a6e3a1; --teal: #94e2d5;
        --blue: #93c0fc; --lavender: #b4befe;
        --elev-1: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
        --elev-2: 0 3px 6px rgba(0,0,0,.45), 0 2px 4px rgba(0,0,0,.3);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { background: var(--base); color: var(--text); font-family: "Nunito", sans-serif; font-size: 13px; line-height: 1.5; min-height: 100vh; overflow-y: scroll; }

      /* ── App bar ── */
      .app-bar { background: var(--mantle); box-shadow: var(--elev-2); position: sticky; top: 0; z-index: 100; padding: 0 32px; }
      .app-bar-inner { max-width: 1400px; margin: 0 auto; height: 64px; display: flex; align-items: center; gap: 16px; }
      .app-bar-back { font-family: "Rajdhani", sans-serif; font-size: 14px; font-weight: 700; color: var(--lavender); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .15s, gap .15s; }
      .app-bar-back:hover { color: var(--subtext1); gap: 10px; }
      .app-bar-divider { width: 1px; height: 24px; background: var(--surface1); flex-shrink: 0; }
      .app-bar-spacer { flex: 1; }
      .app-bar-fight-title { font-family: "Rajdhani", sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); line-height: 1; }
      .app-bar-fight-title span { color: var(--lavender); }
      .app-bar-meta { font-size: 12px; color: var(--overlay1); text-align: right; line-height: 1.4; }
      .app-bar-meta strong { color: var(--lavender); font-weight: 600; }

      /* ── Tabs ── */
      .tabs-wrap { background: var(--mantle); border-bottom: 1px solid var(--surface0); padding: 0 32px; }
      .tabs { max-width: 1400px; margin: 0 auto; display: flex; gap: 12px; padding: 12px 0; align-items: center; justify-content: center; }
      .tab-btn { background: rgba(102,108,118,.15); border: none; border-radius: 6px; color: var(--subtext0); cursor: pointer; font-family: "Rajdhani", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 16px; white-space: nowrap; transition: background .15s, color .15s, transform .08s; }
      .tab-btn:hover { background: rgba(102,108,118,.3); color: var(--subtext1); transform: translateY(-1px); }
      .tab-btn.active { background: var(--lavender); color: var(--crust); box-shadow: 0 2px 8px rgba(180,190,254,.2); }

      /* ── Panels ── */
      .panel { display: none; padding: 24px 32px 60px; margin: 0 auto; }
      .panel.active { display: block; }
      .header-section { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; max-width: 1400px; margin-left: auto; margin-right: auto; }
      .legend { display: flex; gap: 20px; flex-wrap: wrap; font-size: 11px; font-weight: 700; font-family: "Rajdhani", sans-serif; letter-spacing: 1px; text-transform: uppercase; justify-content: center; }
      .legend-item { display: flex; align-items: center; gap: 6px; }
      .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
      .notes { background: var(--mantle); border: 1px solid var(--surface0); border-left: 3px solid var(--teal); border-radius: 8px; padding: 14px 18px; box-shadow: var(--elev-1); }
      .notes h4 { font-family: "Rajdhani", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
      .notes ul { list-style: none; }
      .notes li { font-size: 12px; color: var(--subtext0); line-height: 1.7; }
      .notes li::before { content: "›  "; color: var(--overlay0); }

      /* ── Table ── */
      .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--surface0); margin-bottom: 24px; box-shadow: var(--elev-1); scrollbar-gutter: stable; }
      table { width: 100%; border-collapse: collapse; min-width: 1200px; table-layout: fixed; }
      thead tr { background: var(--mantle); border-bottom: 1px solid var(--surface0); }
      thead th { font-family: "Rajdhani", sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 10px; text-align: left; white-space: nowrap; color: var(--overlay1); border-right: 1px solid var(--surface0); }
      thead th:last-child { border-right: none; }
      .col-time { width: 60px;  color: var(--subtext0) !important; }
      .col-mech { width: 180px; color: var(--text) !important; }
      .col-t { width: 190px; color: var(--blue) !important; }
      .col-h { width: 190px; color: var(--green) !important; }
      .col-m { width: 175px; color: var(--red) !important; }
      .col-r { width: 175px; color: var(--yellow) !important; }
      tbody tr { border-bottom: 1px solid var(--surface0); transition: background .1s, border-left-color .1s; border-left: 3px solid transparent; }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:nth-child(odd)  { background: var(--base); }
      tbody tr:nth-child(even) { background: var(--mantle); }
      tbody tr:hover { background: rgba(180,190,254,.08); border-left-color: var(--teal); }
      td { padding: 10px 12px; vertical-align: top; border-right: 1px solid var(--surface0); overflow-wrap: break-word; }
      td:last-child { border-right: none; }
      .td-time { font-family: "Rajdhani", sans-serif; font-size: 13px; font-weight: 800; color: var(--subtext1); white-space: nowrap; padding-top: 10px; }
      .td-mech { font-weight: 700; color: var(--text); font-size: 12px; padding-top: 10px; }

      /* ── Pills ── */
      .pills { display: flex; flex-direction: column; gap: 4px; }
      .pill {
        display: block; width: 100%; border-radius: 6px; padding: 4px 8px;
        font-size: 10px; font-weight: 700; line-height: 1.5;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        backdrop-filter: blur(4px); text-shadow: 0 1px 2px rgba(0,0,0,.3);
        transition: transform .1s; box-sizing: border-box; text-align: center;
      }
      .pill:hover { transform: scale(1.05); }

      /* Pill color and personal/party shading injected by ability_db.js */

      /* ── Job dropdowns ── */
      .cs-wrap { position: relative; width: 100%; }
      .cs-trigger { display: flex; align-items: center; gap: 5px; background: var(--surface0); border: 1px solid var(--overlay1); border-radius: 4px; color: var(--text); font-family: "Nunito", sans-serif; font-size: 11px; padding: 4px 6px; cursor: pointer; transition: background .15s, border-color .15s; width: 100%; box-sizing: border-box; }
      .cs-trigger:hover { background: var(--surface1); border-color: var(--lavender); }
      .cs-trigger.open  { background: var(--surface1); border-color: var(--lavender); box-shadow: 0 0 0 2px rgba(180,190,254,.2); }
      .cs-trigger img   { width: 14px; height: 14px; flex-shrink: 0; }
      .cs-label  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cs-arrow  { font-size: 9px; color: var(--overlay1); flex-shrink: 0; }
      .cs-dropdown { display: none; position: fixed; background: var(--mantle); border: 1px solid var(--surface1); border-radius: 6px; box-shadow: var(--elev-2); z-index: 9999; min-width: 140px; overflow: hidden; }
      .cs-dropdown.open { display: block; }
      .cs-option { display: flex; align-items: center; gap: 7px; padding: 6px 10px; font-family: "Nunito", sans-serif; font-size: 11px; color: var(--subtext0); cursor: pointer; transition: background .1s, color .1s; }
      .cs-option:hover    { background: var(--surface0); color: var(--text); }
      .cs-option.selected { color: var(--lavender); }
      .cs-option img      { width: 14px; height: 14px; flex-shrink: 0; }
      .cs-placeholder { padding: 6px 10px; font-family: "Nunito", sans-serif; font-size: 11px; color: var(--overlay0); cursor: pointer; transition: background .1s; }
      .cs-placeholder:hover { background: var(--surface0); }

      /* ── Footer ── */
      footer { background: var(--mantle); border-top: 1px solid var(--surface0); padding: 18px 32px; }
      .footer-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
      footer p { font-size: 11px; color: var(--overlay0); }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--crust); }
      ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }

      /* ── Cheatsheet ── */
      .cs-sheet-wrap { max-width: 900px; margin: 0 auto; }
      .cs-sheet-controls { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 24px; background: var(--mantle); border: 1px solid var(--surface0); border-radius: 10px; padding: 16px 20px; }
      .cs-sheet-label { font-family: "Rajdhani", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--overlay1); margin-bottom: 8px; display: block; }
      .cs-slot-picker { display: flex; gap: 6px; flex-wrap: wrap; }
      .cs-slot-btn { background: rgba(102,108,118,.15); border: 1px solid var(--surface1); border-radius: 6px; color: var(--subtext0); cursor: pointer; font-family: "Rajdhani", sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; transition: background .15s, color .15s, border-color .15s; }
      .cs-slot-btn:hover  { background: rgba(102,108,118,.3); color: var(--text); }
      .cs-slot-btn.active { background: var(--lavender); color: var(--crust); border-color: var(--lavender); }
      .cs-sheet-job-info  { display: flex; align-items: center; gap: 8px; font-family: "Rajdhani", sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
      .cs-sheet-job-info img { width: 24px; height: 24px; }
      .cs-sheet-empty { text-align: center; color: var(--overlay0); font-size: 13px; padding: 60px 0; }
      .cs-sheet-phases { display: grid; gap: 24px; }
      @media (max-width: 700px) { .cs-sheet-phases { grid-template-columns: 1fr !important; } }
      .cs-sheet-phase-title { font-family: "Rajdhani", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--lavender); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--surface0); }
      .cs-rows { display: flex; flex-direction: column; gap: 6px; }
      .cs-row { display: grid; grid-template-columns: 52px 1fr auto; align-items: center; gap: 10px; background: var(--mantle); border: 1px solid var(--surface0); border-radius: 8px; padding: 8px 12px; transition: background .1s; }
      .cs-row:hover { background: rgba(180,190,254,.06); }
      .cs-row-time { font-family: "Rajdhani", sans-serif; font-size: 14px; font-weight: 800; color: var(--subtext1); white-space: nowrap; }
      .cs-row-mech { font-size: 12px; font-weight: 600; color: var(--subtext0); }
      .cs-row-mits { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
      .cs-row-mit  { border-radius: 6px; padding: 3px 10px; font-size: 10px; font-weight: 700; white-space: nowrap; text-align: center; }
    </style>
  </head>
  <body>

    <div class="app-bar">
      <div class="app-bar-inner">
        <a class="app-bar-back" href="../../index.html">← Back</a>
        <div class="app-bar-divider"></div>
        <div class="app-bar-fight-title" id="fight-title"></div>
        <div class="app-bar-spacer"></div>
        <div class="app-bar-meta">Last updated: <strong id="fight-date"></strong></div>
      </div>
    </div>

    <div class="tabs-wrap">
      <div class="tabs" id="tab-bar"></div>
    </div>

    <div id="phase-panels"></div>

    <div id="tab-cs" class="panel">
      <div class="cs-sheet-wrap">
        <div class="cs-sheet-controls">
          <div>
            <span class="cs-sheet-label">Your slot</span>
            <div id="cs-slot-picker" class="cs-slot-picker"></div>
          </div>
          <div id="cs-sheet-job-info" class="cs-sheet-job-info"></div>
        </div>
        <div id="cs-sheet-no-selection" class="cs-sheet-empty">
          Select a slot above to generate your cheatsheet.
        </div>
        <div id="cs-sheet-content" style="display:none">
          <div class="cs-sheet-phases" id="cs-phases"></div>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-inner">
        <p>Not affiliated with Square Enix · Plans are community suggestions</p>
        <p>Maintained by <strong style="color:var(--subtext0)">Arvid Vhalnan</strong> @ Omega</p>
      </div>
    </footer>

    <script src="../../js/ability_db.js"></script>
    <script src="m12s.js"></script>
    <script>
      // ─────────────────────────────────────────────
      // STATE
      // ─────────────────────────────────────────────
      const PARTY_COMPOSITION = { T1:'', T2:'', H1:'', H2:'', M1:'', M2:'', R1:'', R2:'' };
      const COL_SLOTS = ['T1','T2','H1','H2','M1','M2','R1','R2'];
      const SLOT_LABELS = { T1:'MT', T2:'OT', H1:'H1', H2:'H2', M1:'M1', M2:'M2', R1:'R1', R2:'R2' };
      const SLOT_INDEX  = { T1:2, T2:3, H1:4, H2:5, M1:6, M2:7, R1:8, R2:9 };

      // ─────────────────────────────────────────────
      // BOOT — populate title, build tabs + panels
      // ─────────────────────────────────────────────
      document.title = `DYM · ${FIGHT_CONFIG.title}`;
      document.getElementById('fight-title').innerHTML =
        `${FIGHT_CONFIG.title} <span>${FIGHT_CONFIG.subtitle}</span>`;
      document.getElementById('fight-date').textContent = FIGHT_CONFIG.lastUpdated;

      const LEGEND_HTML = `
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span style="color:var(--blue)">Tank</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span style="color:var(--green)">Healer</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div><span style="color:var(--red)">Melee</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div><span style="color:var(--yellow)">Ranged / Caster</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--peach)"></div><span style="color:var(--peach)">Tankbuster / Hard hitting</span></div>
        </div>`;

      const tabBar      = document.getElementById('tab-bar');
      const phasePanels = document.getElementById('phase-panels');

      FIGHT_CONFIG.phases.forEach((phase, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = phase.name;
        btn.onclick = function() { switchTab(phase.id, this); };
        tabBar.appendChild(btn);

        const notesHtml = phase.notes.length ? `
          <div class="notes">
            <h4>Notes — ${phase.name}</h4>
            <ul>${phase.notes.map(n => `<li>${n}</li>`).join('')}</ul>
          </div>` : '';

        const panel = document.createElement('div');
        panel.id = `tab-${phase.id}`;
        panel.className = 'panel' + (i === 0 ? ' active' : '');
        panel.innerHTML = `
          <div class="header-section">
            ${LEGEND_HTML}
            ${notesHtml}
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr id="${phase.id}-header"></tr></thead>
              <tbody id="${phase.id}-body"></tbody>
            </table>
          </div>`;
        phasePanels.appendChild(panel);
      });

      const csBtn = document.createElement('button');
      csBtn.className = 'tab-btn';
      csBtn.textContent = 'Cheatsheet';
      csBtn.onclick = function() { switchTab('cs', this); };
      tabBar.appendChild(csBtn);

      // ─────────────────────────────────────────────
      // CUSTOM JOB DROPDOWNS
      // ─────────────────────────────────────────────
      let activeDropdown = null;

      function openCustomSelect(wrap) {
        const trigger  = wrap.querySelector('.cs-trigger');
        const dropdown = wrap.querySelector('.cs-dropdown');
        if (activeDropdown && activeDropdown !== wrap) {
          activeDropdown.querySelector('.cs-trigger').classList.remove('open');
          activeDropdown.querySelector('.cs-dropdown').classList.remove('open');
        }
        if (dropdown.classList.contains('open')) {
          trigger.classList.remove('open');
          dropdown.classList.remove('open');
          activeDropdown = null;
          return;
        }
        const rect = trigger.getBoundingClientRect();
        dropdown.style.top  = (rect.bottom + 4) + 'px';
        dropdown.style.left = rect.left + 'px';
        trigger.classList.add('open');
        dropdown.classList.add('open');
        activeDropdown = wrap;
      }

      function selectCustomOption(wrap, value, label, jobIcon) {
        const trigger      = wrap.querySelector('.cs-trigger');
        const dropdown     = wrap.querySelector('.cs-dropdown');
        const hiddenSelect = wrap.querySelector('select');
        const icon = jobIcon || wrap.dataset.icon;
        trigger.querySelector('.cs-label').textContent = label;
        trigger.querySelector('img').src = icon;
        dropdown.querySelectorAll('.cs-option').forEach(opt => {
          opt.classList.toggle('selected', opt.dataset.value === value);
        });
        hiddenSelect.value = value;
        // Update PARTY_COMPOSITION and rerender
        const slot = wrap.dataset.slot;
        PARTY_COMPOSITION[slot] = value;
        document.querySelectorAll(`select[data-slot="${slot}"]`).forEach(s => s.value = value);
        rerenderTables();
        trigger.classList.remove('open');
        dropdown.classList.remove('open');
        activeDropdown = null;
      }

      document.addEventListener('click', (e) => {
        if (activeDropdown && !activeDropdown.contains(e.target)) {
          activeDropdown.querySelector('.cs-trigger').classList.remove('open');
          activeDropdown.querySelector('.cs-dropdown').classList.remove('open');
          activeDropdown = null;
        }
      });

      function buildHeader(trId, placeholders) {
        const tr = document.getElementById(trId);
        tr.innerHTML =
          `<th class="col-time">Time</th><th class="col-mech">Mechanic</th>` +
          HEADER_COLS.map(col => {
            const role        = JOB_OPTIONS[col.type];
            const icon        = role.icon;
            const placeholder = placeholders[col.slot];
            const optionsHtml = role.jobs.map(([v, l, jobIcon]) => `
              <div class="cs-option" data-value="${v}" data-icon="${jobIcon}"
                   onclick="selectCustomOption(this.closest('.cs-wrap'),'${v}','${l}','${jobIcon}')">
                <img src="${jobIcon}" alt="" />${l}
              </div>`).join('');
            const hiddenOpts = role.jobs.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
            return `<th class="${col.cls}">
              <div class="cs-wrap" data-slot="${col.slot}" data-icon="${icon}">
                <div class="cs-trigger" onclick="openCustomSelect(this.closest('.cs-wrap'))">
                  <img src="${icon}" alt="" />
                  <span class="cs-label">${placeholder}</span>
                  <span class="cs-arrow">▾</span>
                </div>
                <div class="cs-dropdown">
                  <div class="cs-placeholder"
                       onclick="selectCustomOption(this.closest('.cs-wrap'),'','${placeholder}')">
                    ${placeholder}
                  </div>
                  ${optionsHtml}
                </div>
                <select hidden class="job-select" data-slot="${col.slot}">
                  <option value=""></option>${hiddenOpts}
                </select>
              </div>
            </th>`;
          }).join('');

        HEADER_COLS.forEach(col => {
          const val = PARTY_COMPOSITION[col.slot];
          if (val) {
            const wrap  = tr.querySelector(`.cs-wrap[data-slot="${col.slot}"]`);
            const match = JOB_OPTIONS[col.type].jobs.find(([v]) => v === val);
            if (match && wrap) selectCustomOption(wrap, match[0], match[1], match[2]);
          }
        });
      }

      // ─────────────────────────────────────────────
      // RENDERING — uses AbilityEngine
      // ─────────────────────────────────────────────

      // Shared helper: resolve IDs → pill HTML for a given job + slot.
      // tag: element tag ('span' for table, 'div' for cheatsheet)
      function renderPills(rawContent, job, slot, tag = 'span') {
        if (!rawContent || !job) return '';
        return rawContent.split(/[+,]/).map(uID => {
          const a = AbilityEngine.resolve(uID.trim(), job, slot);
          if (!a) return '';
          return `<${tag} class="pill ${a.p ? 'is-p' : 'is-g'}" style="--c:var(${a.col})">${a.name}</${tag}>`;
        }).filter(Boolean).join('');
      }

      function renderCell(rawContent, slot) {
        const job = PARTY_COMPOSITION[slot];
        const html = renderPills(rawContent, job, slot);
        if (!html) return '<td></td>';
        return `<td><div class="pills">${html}</div></td>`;
      }

      function rerenderTables() {
        FIGHT_CONFIG.phases.forEach(phase => {
          document.getElementById(`${phase.id}-body`).innerHTML =
            phase.data.map(row => {
              const [time, mech, ...cells] = row;
              const cellsHTML = COL_SLOTS.map((slot, i) => renderCell(cells[i], slot)).join('');
              return `<tr>
                <td class="td-time">${time}</td>
                <td class="td-mech">${mech}</td>
                ${cellsHTML}
              </tr>`;
            }).join('');
        });
        rerenderCheatsheet();
      }

      // ─────────────────────────────────────────────
      // CHEATSHEET
      // ─────────────────────────────────────────────
      let csActiveSlot = null;

      function buildCheatsheetSlotPicker() {
        document.getElementById('cs-slot-picker').innerHTML =
          HEADER_COLS.map(col => `
            <button class="cs-slot-btn" data-slot="${col.slot}"
                    onclick="selectCheatsheetSlot('${col.slot}')">
              ${SLOT_LABELS[col.slot]}
            </button>`).join('');

        const csPhases = document.getElementById('cs-phases');
        csPhases.style.gridTemplateColumns = Array(Math.min(FIGHT_CONFIG.phases.length, 3)).fill('1fr').join(' ');
        csPhases.innerHTML = FIGHT_CONFIG.phases.map(phase => `
          <div class="cs-sheet-phase">
            <div class="cs-sheet-phase-title">${phase.name}</div>
            <div id="cs-${phase.id}-rows" class="cs-rows"></div>
          </div>`).join('');
      }

      function selectCheatsheetSlot(slot) {
        csActiveSlot = slot;
        document.querySelectorAll('.cs-slot-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.slot === slot);
        });
        const job = PARTY_COMPOSITION[slot];
        const jobInfo = document.getElementById('cs-sheet-job-info');
        if (job) {
          const col   = HEADER_COLS.find(c => c.slot === slot);
          const match = JOB_OPTIONS[col.type].jobs.find(([v]) => v === job);
          jobInfo.innerHTML = match ? `<img src="${match[2]}" alt="${match[1]}" />${match[1]}` : '';
        } else {
          jobInfo.innerHTML = `<span style="color:var(--overlay0);font-size:13px">No job selected</span>`;
        }
        renderCheatsheet(slot);
      }

      function renderCheatsheet(slot) {
        const idx = SLOT_INDEX[slot];
        const job = PARTY_COMPOSITION[slot];
        document.getElementById('cs-sheet-no-selection').style.display = 'none';
        document.getElementById('cs-sheet-content').style.display      = 'block';

        FIGHT_CONFIG.phases.forEach(phase => {
          const container = document.getElementById(`cs-${phase.id}-rows`);
          const rows = phase.data.filter(r => r[idx]);
          if (!rows.length) {
            container.innerHTML = `<div style="color:var(--overlay0);font-size:12px;padding:8px 0">Nothing assigned.</div>`;
            return;
          }
          container.innerHTML = rows.map(r => {
            const mitsHtml = renderPills(r[idx], job, slot, 'div').replace(/class="pill /g, 'class="cs-row-mit pill ');
            return `
              <div class="cs-row">
                <div class="cs-row-time">${r[0]}</div>
                <div class="cs-row-mech">${r[1]}</div>
                <div class="cs-row-mits">${mitsHtml}</div>
              </div>`;
          }).join('');
        });
      }

      function rerenderCheatsheet() {
        if (csActiveSlot) selectCheatsheetSlot(csActiveSlot);
      }

      function switchTab(id, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${id}`).classList.add('active');
      }

      // ─────────────────────────────────────────────
      // INIT
      // ─────────────────────────────────────────────
      buildCheatsheetSlotPicker();
      FIGHT_CONFIG.phases.forEach(phase => {
        const placeholders = Object.fromEntries(
          HEADER_COLS.map(col => [col.slot, `Select ${SLOT_LABELS[col.slot]}`])
        );
        buildHeader(`${phase.id}-header`, placeholders);
      });
      rerenderTables();
    </script>
  </body>
</html>
